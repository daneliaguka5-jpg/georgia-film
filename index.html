<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>GEORGIA FILM</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ff0000; font-size: 40px; text-shadow: 0 0 10px #ff0000; }
        #player-box { display: none; margin: 20px auto; max-width: 800px; border: 2px solid #ff0000; padding: 10px; background: #111; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); border-color: #ff0000; }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card b { display: block; padding: 10px; font-size: 13px; }
    </style>
</head>
<body>
    <h1>GEORGIA FILM</h1>
    <div id="player-box">
        <h3 id="m-title" style="color:red;"></h3>
        <iframe id="v-frame" width="100%" height="450" src="" frameborder="0" allowfullscreen></iframe>
        <button onclick="closeVid()" style="width:100%; padding:10px; margin-top:10px; background:red; color:#fff; border:none; cursor:pointer; font-weight:bold;">დახურვა</button>
    </div>
    <div id="grid"></div>
    <script>
        const KEY = '8dd026cf94c34a1b023961168f1c8418';
        async function load() {
            const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${KEY}`);
            const data = await res.json();
            const grid = document.getElementById('grid');
            data.results.forEach(m => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><b>${m.title}</b>`;
                div.onclick = () => {
                    document.getElementById('player-box').style.display = 'block';
                    document.getElementById('m-title').innerText = m.title;
                    document.getElementById('v-frame').src = `https://vidsrc.me/embed/movie?tmdb=${m.id}`;
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                grid.appendChild(div);
            });
        }
        function closeVid() { document.getElementById('player-box').style.display='none'; document.getElementById('v-frame').src=''; }
        load();
    </script>
</body>
</html>
