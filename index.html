            display: none; 
            margin: 0 auto 40px auto; 
            max-width: 1000px; 
            background: #000; 
            border: 3px solid #ff0000; 
            border-radius: 15px; 
            padding: 15px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
        }

            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }
