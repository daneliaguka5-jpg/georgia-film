<!DOCTYPE html>
<html lang="ka">
<head>

    <title>GEORGIA FILM</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        h1 { 
            color: #ff0000; 
            font-size: 45px; 
            text-shadow: 0 0 20px #ff0000; 
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        #player-box { 
            display: none; 
            margin: 0 auto 30px auto; 
            max-width: 900px; 
            border: 2px solid #ff0000; 
            padding: 10px; 
            background: #111; 
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255,0,0,0.4);
        }

        #grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; 
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333; 
            cursor: pointer; 
            transition: 0.3s ease;
        }
